<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FuturaVision AI</title>
<style>
body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    text-align:center;
}
button{
    padding:10px 20px;
    font-size:16px;
    margin:10px;
}
.card{
    background:#1e293b;
    padding:15px;
    margin:15px auto;
    width:80%;
    border-radius:10px;
}
.bar{
    height:20px;
    background:green;
    border-radius:10px;
}
</style>
</head>

<body>

<h1>FuturaVision AI</h1>
<p>Scan objek dan lihat dampaknya di masa depan</p>
<button onclick="init()">Start Camera</button>

<div id="webcam-container"></div>

<div class="card">
<h2 id="result">Hasil: -</h2>
<p id="confidence"></p>
</div>

<div class="card">
<h3>📈 Indeks Dampak</h3>
<div style="background:#334155; width:80%; margin:auto;">
<div id="impactBar" class="bar" style="width:0%"></div>
</div>
<p id="impactScore"></p>
</div>

<div class="card">
<h3>📊 Simulasi Masa Depan</h3>
<p id="simulation"></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script>

const URL = "https://teachablemachine.withgoogle.com/models/Rhuhw0peO/";

let model, webcam;

const impactDatabase = {

"Fast Food": {
    score: 80,
    simulation: "Jika dikonsumsi setiap hari selama 1 tahun:\n• Risiko obesitas meningkat\n• Kolesterol naik\n• Risiko penyakit jantung bertambah"
},

"Healthy Food": {
    score: 20,
    simulation: "Jika dikonsumsi rutin selama 1 tahun:\n• Berat badan stabil\n• Sistem imun meningkat\n• Risiko penyakit menurun"
},

"Plastic": {
    score: 90,
    simulation: "Jika digunakan setiap hari selama 1 tahun:\n• Potensi sampah bertambah ±18 kg\n• Waktu terurai ±450 tahun\n• Meningkatkan pencemaran laut"
},

"Book": {
    score: 10,
    simulation: "Jika membaca 20 menit/hari selama 6 bulan:\n• Peningkatan kosakata ±25%\n• Fokus meningkat\n• Prestasi akademik naik"
},

"Gadget": {
    score: 60,
    simulation: "Jika digunakan >6 jam/hari selama 1 tahun:\n• Risiko gangguan mata\n• Kualitas tidur menurun\n• Potensi kecanduan digital"
}

};

async function init() {

const modelURL = URL + "model.json";
const metadataURL = URL + "metadata.json";

model = await tmImage.load(modelURL, metadataURL);

webcam = new tmImage.Webcam(300, 300, true);
await webcam.setup();
await webcam.play();
window.requestAnimationFrame(loop);

document.getElementById("webcam-container")
.appendChild(webcam.canvas);
}

async function loop() {
webcam.update();
await predict();
window.requestAnimationFrame(loop);
}

async function predict() {

const prediction = await model.predict(webcam.canvas);

let highest = prediction.reduce((prev, current) =>
(prev.probability > current.probability) ? prev : current
);

document.getElementById("result").innerHTML =
"Terdeteksi: " + highest.className;

document.getElementById("confidence").innerHTML =
"Confidence: " + (highest.probability * 100).toFixed(1) + "%";

if(impactDatabase[highest.className]){

let data = impactDatabase[highest.className];

document.getElementById("simulation").innerHTML =
data.simulation.replace(/\n/g, "<br>");

document.getElementById("impactScore").innerHTML =
"Skor Dampak: " + data.score + "/100";

document.getElementById("impactBar").style.width =
data.score + "%";

if(data.score > 70){
document.getElementById("impactBar").style.background = "red";
}else if(data.score > 40){
document.getElementById("impactBar").style.background = "orange";
}else{
document.getElementById("impactBar").style.background = "green";
}

}

}

</script>

</body>
</html>
